name: yusui

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: yusui
      YUSUI_MIGRATE_PASSWORD: ${YUSUI_MIGRATE_PASSWORD:-migratesecret}
      YUSUI_APP_PASSWORD: ${YUSUI_APP_PASSWORD:-appsecret}
    ports:
      # Host 5432 is often taken; publish on 5433 (server reaches PG over the
      # compose network regardless). Override with POSTGRES_HOST_PORT.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  # One-shot: applies migrations as the DDL-owner role, then exits.
  migrate:
    build:
      context: ..
      dockerfile: server/Dockerfile
    command: ["migrate"]
    environment:
      DATABASE_URL: postgres://yusui_migrate:${YUSUI_MIGRATE_PASSWORD:-migratesecret}@postgres:5432/yusui?sslmode=disable
    depends_on:
      postgres:
        condition: service_started   # app retries the ping; no healthcheck needed
    restart: "no"

  # Long-running server connects as the least-privilege app role.
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    command: ["serve"]
    environment:
      DATABASE_URL: postgres://yusui_app:${YUSUI_APP_PASSWORD:-appsecret}@postgres:5432/yusui?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
