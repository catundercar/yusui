version: "2"
sql:
  - engine: "postgresql"
    # Schema is the goose migration set; queries live alongside this file.
    schema: "../migrate/migrations"
    queries: "queries"
    gen:
      go:
        package: "store"
        out: "."
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
