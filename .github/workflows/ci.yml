name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yusui
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l server agent)
          if [ -n "$unformatted" ]; then echo "needs gofmt:"; echo "$unformatted"; exit 1; fi
      - name: build
        run: go build github.com/catundercar/yusui/server/... github.com/catundercar/yusui/agent/...
      - name: test
        run: |
          (cd server && go test ./...)
          (cd agent && go test ./...)
      - name: migration smoke
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: yusui
        run: |
          psql -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE yusui_app LOGIN PASSWORD 'appsecret';" \
            -c "CREATE ROLE yusui_migrate LOGIN PASSWORD 'migratesecret';" \
            -c "GRANT CREATE, CONNECT ON DATABASE yusui TO yusui_migrate;" \
            -c "GRANT CONNECT ON DATABASE yusui TO yusui_app;"
          cd server
          DATABASE_URL="postgres://postgres:postgres@localhost:5432/yusui?sslmode=disable" \
            go run ./cmd/yusui-server migrate

  e2e:
    # Browser-driven critical path: submit→approve→Web SSH→command filter, plus
    # the 401-refresh regression guard. Brings up the real stack (PG + sshd
    # asset + server + web preview) via scripts/e2e-stack.sh, then runs Playwright.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install web deps
        run: cd web && npm ci
      - name: install playwright chromium
        run: cd web && npx playwright install --with-deps chromium
      - name: bring up stack + run e2e
        env:
          PG_EXTERNAL: "1"
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          bash scripts/e2e-stack.sh up
          cd web && npx playwright test
      - name: dump server/web logs on failure
        if: failure()
        run: |
          echo "=== serve.log ==="; cat /tmp/yusui-e2e-serve.log || true
          echo "=== web.log ===";   cat /tmp/yusui-e2e-web.log || true
      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: ignore

  e2e-grpc:
    # draft10: a REAL yusui-agent (userspace L4 forwarder) in the loop over gRPC,
    # all on loopback (no NetBird). Guards that Web Shell dials the forwarder and
    # it relays to the sshd asset with the command filter active.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: grpc forwarder e2e
        env:
          PG_EXTERNAL: "1"
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
        run: bash scripts/e2e-grpc.sh
      - name: dump logs on failure
        if: failure()
        run: |
          echo "=== server ==="; cat /tmp/yusui-grpc-srv.log || true
          echo "=== agent  ==="; cat /tmp/yusui-grpc-agt.log || true
          echo "=== wstest ==="; cat /tmp/yusui-grpc-wst.out || true
